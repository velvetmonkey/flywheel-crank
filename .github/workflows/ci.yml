name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name "CI Test"
      - name: Run tests
        run: npm test
      - name: Run cold start tests
        run: npm run test:coldstart --workspace=@velvetmonkey/flywheel-crank
      - name: Run policy tests
        run: npm run test:policy --workspace=@velvetmonkey/flywheel-crank
      - name: Run battle-hardening tests
        run: npm run test:battle-hardening --workspace=@velvetmonkey/flywheel-crank
      - name: Run golden tests
        run: npm run test:golden --workspace=@velvetmonkey/flywheel-crank
      - name: Run fuzzing tests
        run: npm run test:fuzzing --workspace=@velvetmonkey/flywheel-crank
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/mcp-server/coverage/
          retention-days: 7

  # Benchmarks now live in vault-core repository
  # See: https://github.com/velvetmonkey/vault-core

